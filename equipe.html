<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS | Réseau & Partage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary-purple: #a855f7; --dark-purple: #7c3aed; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; }
        .header-gradient { background: linear-gradient(135deg, var(--primary-purple), var(--dark-purple)); padding: 50px 20px; border-radius: 0 0 40px 40px; }
        .glass-card { background: white; border-radius: 25px; border: 1px solid rgba(168, 85, 247, 0.1); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }
        .tab-active { background: var(--primary-purple) !important; color: white !important; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f8f0ff; }
        .copy-btn { background: var(--dark-purple); color: white; transition: all 0.2s; }
        .copy-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="pb-24">

    <div class="header-gradient text-center text-white">
        <h1 class="text-3xl font-extrabold tracking-tight italic uppercase">Mon Réseau CMS</h1>
        <p class="text-xs font-medium opacity-80 mt-2 uppercase tracking-[0.2em]">Programme d'affiliation minier</p>
    </div>

    <div class="px-5 -mt-8 space-y-6">
        <div class="glass-card p-6">
            <h2 class="text-[12px] font-bold text-gray-500 uppercase mb-4 tracking-widest text-center">Développez votre communauté</h2>
            <div class="bg-purple-50 p-4 rounded-2xl border-2 border-dashed border-purple-200 mb-4 flex items-center justify-between">
                <div class="truncate mr-4 text-left">
                    <p class="text-[10px] text-purple-400 font-black uppercase mb-1 text-xs">Lien d'invitation officiel</p>
                    <span id="linkSpan" class="text-[11px] font-semibold text-gray-800 italic">Génération...</span>
                </div>
                <button onclick="copyInvite()" class="copy-btn text-[10px] font-bold px-5 py-3 rounded-xl shadow-md">COPIER</button>
            </div>
            <div class="text-center">
                <p class="text-[11px] font-medium text-gray-400 uppercase">VOTRE CODE PARRAIN : <span id="codeSpan" class="text-purple-600 font-black ml-1 tracking-tighter">---</span></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 text-center border-b-4 border-yellow-400">
                <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-3 text-yellow-600">
                    <i class="fa-solid fa-sack-dollar"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Commissions</p>
                <p id="totalComm" class="text-lg font-black text-gray-900">0 CDF</p>
            </div>
            <div class="glass-card p-5 text-center border-b-4 border-purple-500">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-3 text-purple-600">
                    <i class="fa-solid fa-users-viewfinder"></i>
                </div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Partenaires</p>
                <p id="totalTeam" class="text-lg font-black text-gray-900">0</p>
            </div>
        </div>

        <div class="glass-card p-2">
            <div class="flex gap-2 mb-4 bg-gray-50 p-1.5 rounded-2xl">
                <button id="btn1" onclick="loadTeam(1)" class="tab-active flex-1 py-3 rounded-xl text-[10px] font-bold uppercase transition-all">Niveau 1</button>
                <button id="btn2" onclick="loadTeam(2)" class="flex-1 py-3 rounded-xl text-[10px] font-bold uppercase transition-all text-gray-400">Niveau 2</button>
                <button id="btn3" onclick="loadTeam(3)" class="flex-1 py-3 rounded-xl text-[10px] font-bold uppercase transition-all text-gray-400">Niveau 3</button>
            </div>
            <div id="membersList" class="space-y-1 min-h-[150px]">
                </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Accueil</span>
        </a>
        <a href="produit.html" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-gem text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Produit</span>
        </a>
        <a href="equipe.html" class="flex flex-col items-center text-purple-600 font-bold">
            <i class="fa-solid fa-users text-xl mb-1"></i>
            <span class="text-[10px]">Équipe</span>
        </a>
        <a href="compte.html" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-circle-user text-xl mb-1"></i>
            <span class="text-[10px] font-bold">Compte</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userPhone = localStorage.getItem('userPhone');
        if(!userPhone) window.location.href = "index.html";

        const myInviteCode = "CMS" + userPhone.slice(-5);
        document.getElementById('codeSpan').innerText = myInviteCode;
        
        // CORRECTION DE L'URL : On pointe vers index.html (votre page d'inscription)
        const myInviteLink = "https://srdety.github.io/Cms/index.html?ref=" + myInviteCode;
        document.getElementById('linkSpan').innerText = myInviteLink;

        window.copyInvite = () => {
            navigator.clipboard.writeText(myInviteLink);
            alert("✨ Lien d'invitation copié !");
        };

        window.loadTeam = async (lvl) => {
            // Visuel des onglets
            [1, 2, 3].forEach(n => {
                document.getElementById('btn'+n).className = (n === lvl) ? 
                    "tab-active flex-1 py-3 rounded-xl text-[10px] font-bold uppercase" : 
                    "flex-1 py-3 rounded-xl text-[10px] font-bold uppercase text-gray-400";
            });

            const list = document.getElementById('membersList');
            list.innerHTML = `<p class="text-center py-10 text-[10px] font-bold text-purple-300 animate-pulse">SYNCHRONISATION DU RÉSEAU...</p>`;

            try {
                const snap = await get(ref(db, "users"));
                const allUsers = snap.val();
                let members = [];
                let totalComm = 0;

                for (let key in allUsers) {
                    const user = allUsers[key];
                    // On vérifie le niveau 1 (direct)
                    if (lvl === 1 && user.referralBy === myInviteCode) {
                        members.push(user);
                        totalComm += (parseFloat(user.commissionsGenerees) || 0);
                    }
                    // Note: La logique pour Niveau 2 et 3 peut être ajoutée ici plus tard
                }

                if (members.length === 0) {
                    list.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-12 opacity-20">
                            <i class="fa-solid fa-user-plus text-5xl mb-4"></i>
                            <p class="text-[10px] font-black uppercase tracking-widest text-center">Aucun partenaire au Niveau ${lvl}</p>
                        </div>`;
                } else {
                    list.innerHTML = "";
                    members.forEach(m => {
                        const maskPhone = m.phone.substring(0, 3) + "***" + m.phone.slice(-3);
                        list.innerHTML += `
                            <div class="member-item">
                                <div>
                                    <p class="text-sm font-bold text-gray-800">${maskPhone}</p>
                                    <p class="text-[9px] text-purple-400 font-bold uppercase tracking-tighter">Membre VIP Actif</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm font-black text-green-500">+${(m.balance * 0.1 || 0).toLocaleString()} CDF</p>
                                    <p class="text-[8px] text-gray-400 font-bold uppercase">Bonus Estimé</p>
                                </div>
                            </div>
                        `;
                    });
                }

                document.getElementById('totalTeam').innerText = members.length;
                document.getElementById('totalComm').innerText = totalComm.toLocaleString() + " CDF";

            } catch (e) {
                list.innerHTML = `<p class="text-center py-10 text-red-400 text-[10px] font-bold">ERREUR SERVEUR</p>`;
            }
        };

        window.onload = () => loadTeam(1);
    </script>
</body>
</html>
